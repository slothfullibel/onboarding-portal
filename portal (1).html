function ini(n){return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function ac(n){return`hsl(${(n.charCodeAt(0)*37)%360},45%,40%)`;}
function fc(){
  return CLIENTS.filter(c=>{
    if(!showArch&&c.archived) return false;
    if(showArch&&!c.archived) return false;
    const am=OM[c.hs.am]||"";
    const stMatch=stf==="All"||SM[c.hs.stage]?.l===stf;
    return(of==="All"||c.onboarder===of)&&(af==="All"||am===af)&&stMatch&&c.name.toLowerCase().includes(srch.toLowerCase());
  });
}
function cp(gi){const ph=phases[gi];const tot=ph.reduce((a,p)=>a+(p.id==="p2d"?0:p.tasks.length),0);const dn=ph.reduce((a,p)=>a+(p.id==="p2d"?0:p.tasks.filter(t=>t.complete||t.status==="Completed").length),0);return{tot,dn,pct:tot?Math.round(dn/tot*100):0};}

          h+=`<div class="mwrap"><div class="mhdr"><span style="min-width:82px">Date</span><span style="flex:1">Meeting</span><span style="min-width:52px;text-align:right">Duration</span><span style="min-width:72px">Attendees</span><span style="width:18px"></span></div>`;
          if(!cl.meetings.length){h+=`<div style="padding:18px 13px;text-align:center;font-size:11px;color:#4b5563">No meetings recorded yet.</div>`;}
          else{cl.meetings.forEach((m,mi)=>{const atts=m.att||[];h+=`<div class="mr" onclick="tgM('bm${gi}-${mi}','ba${gi}-${mi}')"><div class="mri"><div class="mdate">${m.date}</div><div style="flex:1;display:flex;align-items:center;gap:7px;min-width:0"><span class="mtitle">${m.title}</span><span class="msrc ${m.src==="gong"?"gb":"zb"}">${m.src==="gong"?"Gong":"Zoom"}</span></div><div class="mdur">${m.dur}</div><div class="avrow">${atts.slice(0,3).map((a,i)=>`<div class="av" style="background:${ac(a.n)};margin-left:${i?"-5px":"0"}">${ini(a.n)}</div>`).join("")}${atts.length>3?`<div class="av" style="background:#374151;margin-left:-5px">+${atts.length-3}</div>`:""}</div><div id="ba${gi}-${mi}" style="font-size:9px;color:#374151;width:18px;text-align:center">▼</div></div><div class="mexp" id="bm${gi}-${mi}"><div class="ahhdr">Attendees · ${atts.length}</div>${atts.map(a=>`<div class="atrow"><div class="atav" style="background:${ac(a.n)}">${ini(a.n)}</div><div><div class="atn">${a.n}</div><div class="ats">${[a.t,a.e].filter(Boolean).join(" · ")}</div></div></div>`).join("")}${!atts.length?'<div style="font-size:11px;color:#4b5563;font-style:italic">No attendee data.</div>':""}</div></div>`;})}
          h+=`</div>`;
        }else{
          h+=`<div class="tw"><table><colgroup><col style="width:22px"><col style="width:20px"><col style="width:22%"><col style="width:95px"><col style="width:140px"><col style="width:100px"><col style="width:100px"><col style="width:95px"><col style="width:22px"></colgroup><thead><tr><th></th><th></th><th>Task</th><th style="text-align:center">Priority</th><th style="text-align:center">Status</th><th style="text-align:center">Assigned To</th><th style="text-align:center">Goal Date</th><th style="text-align:center">Completed</th><th></th></tr></thead><tbody>`;
          phase.tasks.forEach((task,ti)=>{
            const ps=PS[task.priority]||PS.Medium;const ss=SS[task.status]||SS[""];
            const occOpts=["Paul Gervasi","Philip Jacobs","Nico Valenzuela","Taylor Mastin","Levi Bond","Cara Landolt","Chad Hunt","Jesse Mayek","Josh Tazzetta","Chance Ray","Alan May"];
            const prOpts=["Critical","High","Medium","Low"];
            const stOpts=["","Not Started","In Progress - OCC","In Progress - Customer","Completed","Blocked"];
            const prSel=prOpts.map(o=>`<option value="${o}"${task.priority===o?" selected":""} style="background:#1e2130;color:#f9fafb">${o}</option>`).join("");
            const stSel=stOpts.map(o=>`<option value="${o}"${task.status===o?" selected":""} style="background:#1e2130;color:#f9fafb">${o||"— set status —"}</option>`).join("");
            const occDL=`<datalist id="occ-dl-${gi}-${pi}-${ti}">`+occOpts.map(o=>`<option value="${o}">`).join("")+`</datalist>`;
            const isOverdue=task.goalDate&&!task.complete&&new Date(task.goalDate)<new Date();
            h+=`<tr style="background:${task.complete?"#0a0e17":"#111827"};opacity:${task.complete?.55:1}">
<td style="text-align:center;padding:5px 3px"><div class="ck${task.complete?" dk":""}" onclick="tgT(${gi},${pi},${ti})">${task.complete?`<span style="font-size:7px;color:#fff">✓</span>`:""}</div></td>
<td style="text-align:center;padding:5px 2px"><button class="del-btn" onclick="delT(${gi},${pi},${ti})" title="Delete task">🗑</button></td>
<td style="text-decoration:${task.complete?"line-through":"none"};font-size:11px">${task.task}</td>
<td style="padding:3px 5px"><div style="background:${ps.bg};border-radius:5px;overflow:hidden"><select style="background:${ps.bg};color:${ps.t};border:none;font-weight:700;font-size:11px;padding:2px 5px;width:100%;outline:none;cursor:pointer" onchange="updP(${gi},${pi},${ti},this.value)">${prSel}</select></div></td>
<td style="padding:3px 5px"><div class="sel-wrap"><select style="background:${ss.bg};color:${ss.t};border-color:#374151" onchange="updS(${gi},${pi},${ti},this.value)">${stSel}</select></div></td>
<td style="padding:3px 5px">${occDL}<input list="occ-dl-${gi}-${pi}-${ti}" value="${task.occ||''}" placeholder="— assign —" style="font-size:11px;padding:2px 5px;background:#1a2030;border:1px solid #374151;border-radius:5px;color:#a78bfa;width:100%;outline:none" oninput="updO(${gi},${pi},${ti},this.value)"></td>
<td style="padding:3px 5px;text-align:center"><input type="date" value="${task.goalDate||""}" style="font-size:10px;padding:2px 4px;background:#1a2030;border:1px solid ${isOverdue?"#ef4444":"#374151"};border-radius:5px;color:${isOverdue?"#ef4444":"#9ca3af"};width:100%;outline:none;cursor:pointer" onchange="updGD(${gi},${pi},${ti},this.value)"></td>
<td style="padding:3px 7px;text-align:center;font-size:10px;color:${task.completedDate?"#4ade80":"#374151"}">${task.completedDate||"—"}</td>
<td style="text-align:center;padding:5px 3px"><div class="exb${task.comment?" hc":""}" onclick="tgC(${gi},${pi},${ti})"><span style="font-size:6px;color:${task.comment?"#60a5fa":"#4b5563"}">${task._open?"▲":"▼"}</span></div></td></tr>`;
            if(task._open){h+=`<tr class="cmt-row"><td colspan="9"><div class="cmt-lbl">Comment</div><textarea rows="2" placeholder="Add a comment..." onchange="updC(${gi},${pi},${ti},this.value)">${task.comment||""}</textarea></td></tr>`;}
          });
          if(!isC){h+=`<tr><td colspan="9"><span class="addrow" onclick="addT(${gi},${pi})">+ Add task</span></td></tr>`;}
          h+=`</tbody></table></div>`;
        }
      }
      h+=`</div>`;
    });
  }else{
    const ms=cl.meetings;const tm=ms.reduce((a,m)=>a+(parseInt(m.dur)||0),0);
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px"><div style="font-size:11px;color:#4b5563">${ms.length} meeting${ms.length!==1?"s":""} · ${tm} min total</div><div style="display:flex;gap:8px"><span class="msrc gb">Gong</span><span class="msrc zb">Zoom</span></div></div>`;
    if(!ms.length){h+=`<div style="padding:22px;text-align:center;color:#374151;font-size:11px">No meetings recorded yet.</div>`;}
    else{ms.forEach((m,mi)=>{const atts=m.att||[];h+=`<div style="margin-bottom:7px;border:1px solid #1f2937;border-radius:8px;overflow:hidden;background:#111827"><div class="mri" style="cursor:pointer" onclick="tgM('tm${gi}-${mi}','ta${gi}-${mi}')"><div class="mdate">${m.date}</div><div style="flex:1;display:flex;align-items:center;gap:7px;min-width:0"><span class="mtitle">${m.title}</span><span class="msrc ${m.src==="gong"?"gb":"zb"}">${m.src==="gong"?"Gong":"Zoom"}</span></div><div class="mdur">${m.dur}</div><div class="avrow">${atts.slice(0,3).map((a,i)=>`<div class="av" style="background:${ac(a.n)};margin-left:${i?"-5px":"0"}">${ini(a.n)}</div>`).join("")}</div><div id="ta${gi}-${mi}" style="font-size:9px;color:#374151;width:18px;text-align:center">▼</div></div><div class="mexp" id="tm${gi}-${mi}"><div class="ahhdr">Attendees · ${atts.length||"–"}</div>${atts.map(a=>`<div class="atrow"><div class="atav" style="background:${ac(a.n)}">${ini(a.n)}</div><div><div class="atn">${a.n}</div><div class="ats">${[a.t,a.e].filter(Boolean).join(" · ")}</div></div></div>`).join("")}${!atts.length?'<div style="font-size:11px;color:#4b5563;font-style:italic">No attendee data.</div>':""}</div></div>`;});}
  }
  document.getElementById("mc").innerHTML=h;
}

function render(){renderSB();renderMain();}
function selC(i){si=i;tab="board";render();}
function setO(o){of=o;si=0;render();}
function setA(a){af=a;si=0;render();}
function setSt(s){stf=s;si=0;render();}
function sv(v){view=v;document.getElementById("bInt").className="vb"+(v==="internal"?" va":"");document.getElementById("bCli").className="vb"+(v==="client"?" va":"");renderMain();}
function setTab(t){tab=t;renderMain();}
function toggleArch(){showArch=!showArch;si=0;of="All";af="All";stf="All";render();}
document.getElementById("srch").addEventListener("input",e=>{srch=e.target.value;si=0;render();});
function tgP(gi,pi){phases[gi][pi].open=!phases[gi][pi].open;renderMain();}
function tgT(gi,pi,ti){
  const t=phases[gi][pi].tasks[ti];
  t.complete=!t.complete;
  if(t.complete){if(!t.completedDate){stamp(t);}t.status="Completed";}
  else{t.completedDate="";if(t.status==="Completed"){t.status="Not Started";}}
  renderMain();
}
function tgC(gi,pi,ti){phases[gi][pi].tasks[ti]._open=!phases[gi][pi].tasks[ti]._open;renderMain();}
function updC(gi,pi,ti,v){phases[gi][pi].tasks[ti].comment=v;renderMain();}
function updP(gi,pi,ti,v){phases[gi][pi].tasks[ti].priority=v;renderMain();}
function stamp(t){const now=new Date();const d=now.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});const tm=now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});t.completedDate=d+" · "+tm;}
function updS(gi,pi,ti,v){
  const t=phases[gi][pi].tasks[ti];
  t.status=v;
  if(v==="Completed"){
    t.complete=true;
    if(!t.completedDate){stamp(t);}
  } else {
    t.complete=false;
    t.completedDate="";
  }
  renderMain();
}
function updO(gi,pi,ti,v){phases[gi][pi].tasks[ti].occ=v;}
function updGD(gi,pi,ti,v){phases[gi][pi].tasks[ti].goalDate=v;renderMain();}
let _delGi,_delPi,_delTi;
function delT(gi,pi,ti){
  _delGi=gi;_delPi=pi;_delTi=ti;
  document.getElementById("delModalName").textContent=phases[gi][pi].tasks[ti].task;
  document.getElementById("delModal").classList.add("show");
}
function closeDelModal(){document.getElementById("delModal").classList.remove("show");}
function confirmDel(){
  phases[_delGi][_delPi].tasks.splice(_delTi,1);
  closeDelModal();
  renderMain();
}
document.getElementById("delModal").addEventListener("click",function(e){if(e.target===this)closeDelModal();});
function addT(gi,pi){phases[gi][pi].tasks.push({task:"New task",priority:"Medium",status:"Not Started",occ:"",goalDate:"",completedDate:"",comment:"",_open:false,complete:false});renderMain();}
function tgM(id,arrid){const el=document.getElementById(id);const arr=document.getElementById(arrid);if(el){const open=el.style.display!=="block";el.style.display=open?"block":"none";if(arr)arr.textContent=open?"▲":"▼";}}
render();
</script>
</body>
</html>
