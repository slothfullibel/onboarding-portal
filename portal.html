<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCC Onboarding Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;margin:0;padding:0}body{background:#1c1917;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column}
.portal{display:flex;height:100vh;overflow:hidden;background:#1c1917;width:100%;flex:1}
.sidebar{width:260px;border-right:1px solid #1f2937;display:flex;flex-direction:column;background:#13110f;flex-shrink:0}
.sb-top{padding:10px 10px 8px;border-bottom:1px solid #1f2937}
.sb-label{font-size:9px;font-weight:700;color:#4b5563;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.search{width:100%;font-size:11px;padding:4px 7px;background:#1c1917;border:1px solid #374151;border-radius:6px;color:#f9fafb;outline:none;margin-bottom:7px}
.pills{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.pill{font-size:9px;padding:2px 6px;cursor:pointer;border-radius:10px;background:transparent;color:#6b7280;border:1px solid #374151;white-space:nowrap}
.pill.pi{background:#4f46e5;color:#fff;border-color:#4f46e5;font-weight:700}
.pill.pt{background:#0e7490;color:#fff;border-color:#0e7490;font-weight:700}
.pill.pa{background:#7c3aed;color:#fff;border-color:#7c3aed;font-weight:700}
.clist{flex:1;overflow-y:auto}
.ci{padding:9px 11px;cursor:pointer;border-left:2px solid transparent}
.ci.sel{background:#1c1917;border-left-color:#4f46e5}
.ci.arch{opacity:.6}
.cn{font-size:11px;font-weight:500;color:#f9fafb;margin-bottom:2px;display:flex;align-items:center;gap:4px}
.cn span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spill{font-size:9px;font-weight:600;color:#a78bfa;background:#4c1d9530;padding:1px 4px;border-radius:7px;flex-shrink:0}
.sl{font-size:9px;font-weight:600;margin-bottom:3px}
.pb{height:3px;border-radius:2px;background:#1f2937;overflow:hidden;margin-bottom:2px}
.pf{height:100%;background:#4f46e5;border-radius:2px}
.pp{font-size:10px;color:#4b5563}
.sb-footer{padding:8px 10px;border-top:1px solid #1f2937;font-size:9px;color:#374151}
.arch-toggle{width:100%;font-size:10px;padding:5px 10px;background:transparent;border:none;border-top:1px solid #1f2937;color:#6b7280;cursor:pointer;text-align:left}
.arch-toggle:hover{color:#a78bfa}





.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:9px 14px 0;border-bottom:1px solid #1f2937;background:#0d1117}
.tr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.ot{font-size:13px;font-weight:600;color:#f9fafb}
.os{font-size:11px;color:#4b5563}
.prow{display:flex;align-items:center;gap:7px}
.ptop{height:5px;width:90px;border-radius:3px;background:#1f2937;overflow:hidden}
.tabs{display:flex}
.tb{padding:5px 13px;font-size:11px;cursor:pointer;background:transparent;border:none;border-bottom:2px solid transparent;color:#4b5563;font-weight:400}
.tb.ta{color:#a78bfa;border-bottom-color:#4f46e5;font-weight:600}
.content{flex:1;overflow-y:auto;padding:14px}
.card{background:#111827;border:1px solid #1f2937;border-left:3px solid #4f46e5;border-radius:9px;overflow:hidden;margin-bottom:14px;padding:13px 14px}
.cname{font-size:15px;font-weight:700;color:#f9fafb;margin-bottom:5px}
.cbadges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.bdg{font-size:11px;font-weight:600;padding:2px 8px;border-radius:14px;border:1px solid;white-space:nowrap}
.ph-hdr{display:flex;align-items:center;gap:7px;margin-bottom:5px;cursor:pointer;user-select:none}
.ph-arr{font-size:10px}
.ph-lbl{font-size:12px;font-weight:600}
.ph-cnt{font-size:11px;color:#4b5563}
.tw{border:1px solid #1f2937;border-radius:8px;overflow:hidden;margin-bottom:13px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:5px 7px;font-size:10px;font-weight:500;color:#6b7280;border-bottom:1px solid #1f2937;background:#0d1117;white-space:nowrap;text-align:left}
td{padding:5px 7px;border-bottom:1px solid #1a2030;vertical-align:middle;font-size:11px;color:#f9fafb}
.ck{width:13px;height:13px;border-radius:3px;border:1px solid #374151;cursor:pointer;margin:auto;display:flex;align-items:center;justify-content:center}
.ck.dk{background:#4f46e5;border-color:#4f46e5}
.exb{width:13px;height:13px;border-radius:3px;border:1px solid #374151;cursor:pointer;margin:auto;display:flex;align-items:center;justify-content:center}
.exb.hc{background:#1e293b;border-color:#2d4a7a}
.pr{font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;text-align:center;display:inline-block}
.st{font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px;text-align:center;display:inline-block;white-space:nowrap}
.sel-wrap select{font-size:11px;padding:2px 5px;border-radius:5px;border:1px solid #374151;background:#1a2030;color:#f9fafb;cursor:pointer;outline:none;width:100%}
.sel-wrap select:focus{border-color:#4f46e5}
.del-btn{width:18px;height:18px;border-radius:3px;border:1px solid #374151;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#4b5563;font-size:11px;flex-shrink:0;padding:0}
.del-btn:hover{background:#3b1111;border-color:#ef4444;color:#ef4444}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.card-title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card-name{font-size:18px;font-weight:800;color:#f9fafb}
.org-id{font-size:11px;font-weight:700;color:#f59e0b;background:#f59e0b18;border:1px solid #f59e0b40;border-radius:5px;padding:2px 8px}
.card-action-btn{font-size:11px;font-weight:600;color:#d1d5db;background:#1f2937;border:1px solid #374151;border-radius:6px;padding:4px 10px;cursor:pointer}
.card-action-btn:hover{background:#374151}
.card-tags{display:flex;gap:7px;flex-wrap:wrap;margin:7px 0 10px 0}
.tag-occ{font-size:11px;font-weight:700;background:#4c1d95;color:#a78bfa;border-radius:5px;padding:3px 9px}
.tag-pay{font-size:11px;font-weight:700;background:#14532d;color:#4ade80;border-radius:5px;padding:3px 9px}
.card-meta{display:grid;grid-template-columns:repeat(4,auto);gap:18px;margin:6px 0 10px 0;align-items:start}
.meta-block{display:flex;flex-direction:column;gap:2px}
.meta-lbl{font-size:9px;font-weight:700;color:#4b5563;letter-spacing:.08em;text-transform:uppercase}
.meta-val{font-size:12px;font-weight:700;color:#f9fafb}
.meta-sub{font-size:10px;color:#6b7280}
.meta-av{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;margin-right:5px;flex-shrink:0}
.meta-person{display:flex;align-items:center;gap:0}
.card-divider{border:none;border-top:1px solid #1f2937;margin:0 0 10px 0}
.onb-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cmt-row td{background:#0a0e17;padding:6px 10px 8px 26px}
.cmt-lbl{font-size:9px;font-weight:700;color:#4b5563;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
textarea{width:100%;font-size:11px;padding:5px 8px;background:#111827;border:1px solid #374151;border-radius:5px;color:#f9fafb;resize:vertical;outline:none;font-family:inherit}
.addrow{font-size:11px;color:#4b5563;cursor:pointer;padding:6px 9px;background:#0d1117;display:block;border-top:1px solid #1f2937}
.mwrap{border:1px solid #1f2937;border-radius:8px;overflow:hidden;background:#111827;margin-bottom:13px}
.mhdr{display:flex;align-items:center;gap:11px;padding:5px 13px;background:#0d1117;border-bottom:1px solid #1f2937}
.mhdr span{font-size:9px;font-weight:600;color:#4b5563;text-transform:uppercase;letter-spacing:.06em}
.mr{border-bottom:1px solid #1a2030;cursor:pointer}
.mri{display:flex;align-items:center;gap:11px;padding:8px 13px}
.mdate{min-width:82px;font-size:11px;font-weight:600;color:#6b7280;flex-shrink:0}
.mtitle{flex:1;font-size:11px;font-weight:600;color:#f9fafb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msrc{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;flex-shrink:0}
.gb{background:#EEEDFE;color:#534AB7;border:1px solid #AFA9EC}
.zb{background:#E6F1FB;color:#185FA5;border:1px solid #85B7EB}
.mdur{min-width:52px;font-size:11px;color:#6b7280;text-align:right;flex-shrink:0}
.avrow{display:flex;flex-shrink:0}
.av{width:19px;height:19px;border-radius:50%;border:2px solid #111827;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;flex-shrink:0}
.mexp{padding:8px 13px 11px;background:#141926;border-top:1px solid #1a2030;display:none}
.ahhdr{font-size:9px;font-weight:700;color:#4b5563;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.atrow{display:flex;align-items:center;gap:7px;padding:5px 9px;background:#1a1f2e;border-radius:6px;border:1px solid #1f2937;margin-bottom:3px}
.atav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}
.atn{font-size:11px;font-weight:600;color:#f9fafb}
.ats{font-size:10px;color:#6b7280}
.arch-banner{background:#1a1226;border:1px solid #4c1d95;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#a78bfa}

.modal-overlay{display:none;position:fixed;inset:0;background:#00000099;z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#1e2130;border:1px solid #374151;border-radius:10px;padding:22px 24px;min-width:300px;max-width:380px;box-shadow:0 8px 32px #00000088}
.modal-title{font-size:13px;font-weight:700;color:#f9fafb;margin-bottom:8px}
.modal-msg{font-size:11px;color:#9ca3af;margin-bottom:18px;line-height:1.5}
.modal-task{font-size:12px;font-weight:600;color:#a78bfa;background:#1a1226;padding:5px 9px;border-radius:6px;margin-bottom:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{font-size:12px;font-weight:600;padding:6px 16px;border-radius:6px;cursor:pointer;border:1px solid}
.modal-cancel{background:transparent;color:#9ca3af;border-color:#374151}
.modal-cancel:hover{background:#1f2937;color:#f9fafb}
.modal-confirm{background:#7f1d1d;color:#fca5a5;border-color:#ef4444}
.modal-confirm:hover{background:#ef4444;color:#fff}

/* ── MOBILE HAMBURGER BUTTON ────────────────────────────── */
.mob-menu-btn{display:none;position:fixed;top:10px;left:10px;z-index:200;background:#1f2937;border:1px solid #374151;border-radius:8px;padding:7px 10px;cursor:pointer;color:#f9fafb;font-size:16px;line-height:1}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;backdrop-filter:blur(2px)}

/* ── MOBILE MEDIA QUERY ─────────────────────────────────── */
@media(max-width:768px){
  /* Show hamburger, hide sidebar by default */
  .mob-menu-btn{display:flex;align-items:center;justify-content:center}
  .mob-overlay.open{display:block}

  /* Sidebar slides in as drawer */
  .sidebar{
    position:fixed;left:-280px;top:0;bottom:0;z-index:160;
    width:260px;transition:left .25s ease;
    box-shadow:4px 0 24px rgba(0,0,0,.5);
  }
  .sidebar.mob-open{left:0}

  /* Main takes full width, add top padding for hamburger */
  .main{width:100%;padding-top:0}
  .topbar{padding-top:10px}
  .tr{padding-left:46px}  /* offset for hamburger button */

  /* Card meta: 2×2 grid instead of 4-col */
  .card-meta{grid-template-columns:repeat(2,1fr)!important;gap:12px}

  /* Card header: stack title row and actions */
  .card-top{flex-direction:column;gap:8px}
  .card-title-row{flex-wrap:wrap;gap:6px}
  .card-actions-row{display:flex;flex-wrap:wrap;gap:6px}

  /* Task table: hide lower-priority cols, make it scrollable */
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{table-layout:auto;min-width:420px}

  /* Dropdowns: full width on mobile */
  [id^="dd-links-"],[id^="dd-contacts-"]{
    width:calc(100vw - 32px)!important;
    left:16px!important;right:16px!important;
    max-width:none!important;
  }

  /* Progress bar area */
  .ptop{width:60px}

  /* Sidebar search/pills padding */
  .sb-top{padding:8px 8px 6px}
  .pills{gap:3px}

  /* Content padding tighter */
  .content{padding:10px}

  /* Phase header font */
  .ph-lbl{font-size:11px!important}

  /* Modal full-width on mobile */
  .modal-box{width:calc(100vw - 40px)!important;max-width:none!important}
}

@media(max-width:480px){
  /* Even tighter — hide assigned/goal date cols, keep task+status+priority */
  .col-assigned,.col-goal,.col-completed{display:none}
  th.col-assigned,th.col-goal,th.col-completed,
  td.col-assigned,td.col-goal,td.col-completed{display:none}

  /* Card name font */
  .card-name{font-size:13px!important}

  /* Meta 2-col stays but smaller gap */
  .card-meta{gap:8px}
}

/* ── INSIGHTS TAB ────────────────────────────────────────── */
.ins-wrap{display:flex;flex-direction:column;height:100%;gap:11px}
.ins-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:10px;color:#4b5563;font-size:12px;text-align:center}
.ins-empty-icon{font-size:32px;opacity:.35}
.sq-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.sq{font-size:11px;padding:5px 10px;cursor:pointer;background:#1a2030;border:1px solid #374151;border-radius:20px;color:#9ca3af;line-height:1.3}
.sq:hover{border-color:#a78bfa;color:#a78bfa}
.chat-log{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:0}
.chat-log::-webkit-scrollbar{width:3px}
.chat-log::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
.chat-bubble{max-width:88%;padding:9px 13px;border-radius:10px;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.cb-user{align-self:flex-end;background:#4f46e5;color:#fff;border-radius:10px 10px 3px 10px}
.cb-ai{align-self:flex-start;background:#1e2433;border:1px solid #374151;color:#e5e7eb;border-radius:10px 10px 10px 3px}
.cb-err{align-self:flex-start;background:#4a000040;border:1px solid #ef4444;color:#f87171;border-radius:8px;font-size:11px;padding:7px 11px}
.cb-thinking{align-self:flex-start;background:#1e2433;border:1px solid #374151;color:#6b7280;border-radius:10px 10px 10px 3px;font-style:italic}
.chat-input-row{display:flex;gap:7px;align-items:flex-end;flex-shrink:0}
.chat-textarea{flex:1;font-size:12px;padding:8px 11px;background:#1e2433;border:1px solid #374151;border-radius:8px;color:#f9fafb;resize:none;outline:none;line-height:1.5;font-family:inherit}
.chat-textarea:focus{border-color:#4f46e5}
.chat-send{font-size:12px;font-weight:600;padding:8px 14px;background:#4f46e5;color:#fff;border:none;border-radius:8px;cursor:pointer;flex-shrink:0;align-self:stretch}
.chat-send:disabled{background:#1f2937;color:#4b5563;cursor:not-allowed}
.chat-clear{font-size:11px;padding:6px 10px;background:none;border:1px solid #374151;border-radius:6px;color:#4b5563;cursor:pointer;flex-shrink:0}
.chat-clear:hover{color:#f9fafb;border-color:#6b7280}
/* Meeting labels */
.mat-sel{font-size:10px;padding:2px 5px;background:#1a2030;border:1px solid #374151;border-radius:5px;color:#a78bfa;outline:none;cursor:pointer;max-width:130px}
.mat-sel:focus{border-color:#4f46e5}
.att-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;border:1px solid;white-space:nowrap}
.att-attended{background:#14532d40;color:#4ade80;border-color:#4ade8040}
.att-canceled{background:#450a0a40;color:#f87171;border-color:#f8717140}
.att-postponed{background:#78350f40;color:#fbbf24;border-color:#fbbf2440}
.att-pending{background:#1e3a5f40;color:#60a5fa;border-color:#60a5fa40}
/* Transcript field */
.tx-toggle{font-size:10px;padding:2px 8px;background:#1a2030;border:1px solid #374151;border-radius:4px;color:#6b7280;cursor:pointer;flex-shrink:0}
.tx-toggle.has{border-color:#4ade8040;color:#4ade80;background:#14532d40}
.tx-area{width:100%;font-size:10px;padding:6px 8px;background:#0d1117;border:1px solid #374151;border-radius:5px;color:#9ca3af;resize:vertical;outline:none;font-family:monospace;line-height:1.5;margin-top:5px;min-height:80px}

/* ── GANTT ───────────────────────────────────────────────── */
.gantt-wrap{overflow-x:auto;overflow-y:auto;width:100%}
.gantt-table{border-collapse:collapse;min-width:700px;width:100%}
.gantt-label-col{width:200px;min-width:160px}
.gantt-th{padding:4px 6px;font-size:9px;font-weight:700;color:#4b5563;text-transform:uppercase;letter-spacing:.07em;background:#0d1117;border-bottom:1px solid #1f2937;white-space:nowrap;text-align:center}
.gantt-th.label{text-align:left}
.gantt-row-ph td{background:#0d1117;padding:5px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #1f2937}
.gantt-row td{border-bottom:1px solid #12161f;padding:3px 6px;vertical-align:middle}
.gantt-row:hover td{background:#141926}
.gantt-name{font-size:11px;color:#d1d5db;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px}
.gantt-name.meeting{color:#60a5fa}
.gantt-name.no-date{color:#374151;font-style:italic}
.gantt-bar-cell{position:relative;height:22px}
.gantt-bar{position:absolute;height:14px;top:4px;border-radius:3px;min-width:6px;display:flex;align-items:center;padding:0 5px;font-size:9px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;cursor:default;transition:opacity .15s}
.gantt-bar:hover{opacity:.85}
.gantt-today{position:absolute;top:0;bottom:0;width:1px;background:#ef4444;opacity:.7;pointer-events:none}
.gantt-today::after{content:'today';position:absolute;top:-16px;left:2px;font-size:8px;color:#ef4444;font-weight:700;letter-spacing:.05em}
.gantt-empty{padding:30px;text-align:center;color:#374151;font-size:12px}
.gantt-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;font-size:10px;color:#6b7280;align-items:center}
.gantt-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ── CUSTOM CALENDAR PICKER ──────────────────────────────── */
.cal-wrap{position:relative;display:inline-block}
.cal-btn{font-size:11px;font-weight:600;padding:2px 7px;background:#1a2030;border:1px solid #374151;border-radius:5px;color:#a78bfa;cursor:pointer;white-space:nowrap;min-width:90px;text-align:center}
.cal-btn.empty{color:#4b5563}
.cal-btn.overdue{border-color:#ef4444;color:#ef4444}
.cal-btn.glv{font-size:12px;background:transparent;border:none;border-bottom:1px solid #374151;border-radius:0;min-width:110px;text-align:left;padding:1px 2px}
.cal-drop{position:fixed;z-index:9999;background:#1e2433;border:1px solid #374151;border-radius:10px;box-shadow:0 8px 32px #000a;padding:10px;width:220px;display:none}
.cal-drop.open{display:block}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-nav button{background:none;border:none;color:#9ca3af;font-size:14px;cursor:pointer;padding:2px 6px;border-radius:4px}
.cal-nav button:hover{background:#374151;color:#fff}
.cal-nav span{font-size:11px;font-weight:700;color:#f9fafb}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{font-size:9px;font-weight:700;color:#4b5563;text-align:center;padding:2px 0;text-transform:uppercase}
.cal-d{font-size:11px;text-align:center;padding:4px 2px;border-radius:4px;cursor:pointer;color:#9ca3af}
.cal-d:hover{background:#374151;color:#fff}
.cal-d.today{color:#60a5fa;font-weight:700}
.cal-d.sel{background:#4f46e5;color:#fff;font-weight:700}
.cal-d.other{color:#2d3748}
.cal-d.other:hover{background:#1f2937;color:#4b5563}
.cal-clear{display:block;width:100%;margin-top:8px;font-size:10px;padding:4px;background:none;border:1px solid #374151;border-radius:5px;color:#4b5563;cursor:pointer;text-align:center}

// Current backend: localStorage (Option 1)
// To upgrade to a real backend (Option 3/4), replace the three
// functions below — save(), load(), and clearStorage() — with
// fetch() calls to your Cloudflare Worker / Supabase endpoint.
// Everything else in the app calls Storage.save() / Storage.load()

// Future backend swap example:
//   async save(key, val) {
//     await fetch('https://your-worker.workers.dev/set', {
//       method:'POST', body: JSON.stringify({key, val}),

// ═══════════════════════════════════════════════════════════════
const STORAGE_VERSION = "occ_v1";
const Storage = {
  save(key, val) {
    try {
      localStorage.setItem(STORAGE_VERSION + "_" + key, JSON.stringify(val));
    } catch(e) { console.warn("Storage.save failed:", e); }
  },
  load(key) {
    try {
      const raw = localStorage.getItem(STORAGE_VERSION + "_" + key);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  },
  remove(key) {
    try { localStorage.removeItem(STORAGE_VERSION + "_" + key); } catch(e) {}
  },
  clearAll() {
    try {
      Object.keys(localStorage).filter(k => k.startsWith(STORAGE_VERSION)).forEach(k => localStorage.removeItem(k));
    } catch(e) {}
  }
};

// ── SAVE / LOAD HELPERS ──────────────────────────────────────
function saveAll() {
  Storage.save("phases", phases.map(ph => ph.map(p => ({
    id: p.id, open: p.open, _wasComplete: p._wasComplete,
    tasks: p.tasks.map(t => ({
      task: t.task, priority: t.priority, status: t.status,
      occ: t.occ, goalDate: t.goalDate, completedDate: t.completedDate,
      comment: t.comment, _open: t._open, complete: t.complete
    }))
  }))));
  Storage.save("goLiveDates", goLiveDates);
  Storage.save("mMeta", mMeta);
}

function loadAll() {
  // Load phases
  const savedPhases = Storage.load("phases");
  if (savedPhases && savedPhases.length === phases.length) {
    savedPhases.forEach((savedPh, gi) => {
      savedPh.forEach((savedP, pi) => {
        if (!phases[gi][pi]) return;
        phases[gi][pi].open = savedP.open !== undefined ? savedP.open : true;
        phases[gi][pi]._wasComplete = savedP._wasComplete || false;
        // Merge saved tasks — match by index, preserve template structure
        savedP.tasks.forEach((savedT, ti) => {
          if (!phases[gi][pi].tasks[ti]) {
            // Extra tasks added by user — push them
            phases[gi][pi].tasks.push({...savedT, _open: savedT._open||false});
          } else {
            Object.assign(phases[gi][pi].tasks[ti], savedT);
          }
        });
        // Trim if fewer tasks saved (shouldn't happen but safety)
      });
    });
  }
  // Load goLiveDates
  const savedGLD = Storage.load("goLiveDates");
  if (savedGLD) Object.assign(goLiveDates, savedGLD);
  // Load mMeta
  const savedMeta = Storage.load("mMeta");
  if (savedMeta) Object.assign(mMeta, savedMeta);
}

// Auto-save on every state change — called at end of all mutating functions
function autosave() {
  saveAll();
  // Flash save indicator
  var ind = document.getElementById('save-indicator');
  if(ind){
    ind.textContent = '● Saving…';
    ind.style.color = '#a78bfa';
    clearTimeout(autosave._t);
    autosave._t = setTimeout(function(){
      ind.textContent = '● Saved';
      ind.style.color = '#4ade80';
      setTimeout(function(){ind.style.color='#374151';},1500);
    }, 300);
  }
}

function fc(){
  return CLIENTS.filter(c=>{

    const am=OM[c.hs.am]||"";

// ── GANTT CHART ───────────────────────────────────────────────
function renderGantt(cl,ph,gi){
  // Gather all dated items
  const items=[];

  // Task goal dates from phases
  ph.forEach(function(phase){
    if(phase.id==="p2d") return;
    phase.tasks.forEach(function(task){
      if(task.goalDate){
        items.push({
          label:task.task,
          date:task.goalDate,
          endDate:task.completedDate?task.completedDate.split(" ")[0]:task.goalDate,
          type:"task",
          phase:phase.label,
          phaseColor:phase.color,
          complete:task.complete||(task.status==="Completed")
        });
      }
    });
  });

  // Meetings
  cl.meetings.forEach(function(m){
    items.push({
      label:m.title,
      date:m.date,
      endDate:m.date,
      type:"meeting",
      phase:"Meetings",
      phaseColor:"#60a5fa",
      complete:true,
      src:m.src
    });
  });

  // Go live date
  const glv=goLiveDates[cl.name];
  if(glv){
    items.push({label:"Goal Go Live",date:glv,endDate:glv,type:"golive",phase:"Milestones",phaseColor:"#a78bfa",complete:false});
  }

  if(!items.length){
    return '<div class="gantt-empty">No dates set yet.<br><span style="font-size:11px;color:#4b5563">Add Goal Dates to tasks and meetings to see them here.</span></div>';
  }

  // Determine date range
  const allDates=items.map(function(i){return i.date;}).filter(Boolean);
  const today=new Date();today.setHours(0,0,0,0);
  allDates.push(today.toISOString().slice(0,10));
  if(glv)allDates.push(glv);

  const minD=new Date(allDates.reduce(function(a,b){return a<b?a:b;}));
  const maxD=new Date(allDates.reduce(function(a,b){return a>b?a:b;}));
  // Pad by 7 days each side
  minD.setDate(minD.getDate()-7);
  maxD.setDate(maxD.getDate()+14);

  const totalDays=Math.round((maxD-minD)/86400000)||1;

  function pct(d){
    if(!d)return 0;
    var dd=new Date(d);dd.setHours(0,0,0,0);
    return Math.max(0,Math.min(100,((dd-minD)/86400000)/totalDays*100));
  }

  const todayPct=pct(today.toISOString().slice(0,10));

  // Build month header
  var months=[];
  var cur=new Date(minD);
  while(cur<=maxD){
    var key=cur.getFullYear()+"-"+(cur.getMonth()+1);
    if(!months.length||months[months.length-1].key!==key){
      months.push({key:key,label:cur.toLocaleString("default",{month:"short",year:"numeric"}),start:new Date(cur)});
    }
    cur.setDate(cur.getDate()+1);
  }

  // Group items by phase
  var groups={};
  var groupOrder=[];
  items.forEach(function(item){
    if(!groups[item.phase]){groups[item.phase]=[];groupOrder.push(item.phase);}
    groups[item.phase].push(item);
  });
  // Sort each group by date
  groupOrder.forEach(function(g){groups[g].sort(function(a,b){return a.date>b.date?1:-1;});});

  // Render
  var h='<div class="gantt-legend">';
  h+='<div class="gantt-legend-dot" style="background:#4f46e5"></div><span>Task</span>';
  h+='<div class="gantt-legend-dot" style="background:#60a5fa"></div><span>Meeting</span>';
  h+='<div class="gantt-legend-dot" style="background:#a78bfa"></div><span>Go Live</span>';
  h+='<div class="gantt-legend-dot" style="background:#4ade80"></div><span>Completed</span>';
  h+='<div style="width:1px;height:10px;background:#ef4444;display:inline-block"></div><span>Today</span>';
  h+='</div>';

  h+='<div class="gantt-wrap"><table class="gantt-table"><thead><tr>';
  h+='<th class="gantt-th label gantt-label-col">Task / Meeting</th>';
  h+='<th class="gantt-th" style="padding:0"><div style="position:relative;height:24px">';
  // Month labels
  months.forEach(function(mo){
    var startPct=pct(mo.start.toISOString().slice(0,10));
    h+='<span style="position:absolute;left:'+startPct+'%;font-size:9px;color:#4b5563;font-weight:700;top:4px;padding-left:4px;white-space:nowrap">'+mo.label+'</span>';
  });
  h+='</div></th></tr></thead><tbody>';

  groupOrder.forEach(function(groupName){
    var gColor=groups[groupName][0].phaseColor;
    h+='<tr class="gantt-row-ph"><td colspan="2" style="color:'+gColor+'">'+groupName+'</td></tr>';
    groups[groupName].forEach(function(item){
      var startP=pct(item.date);
      var endP=pct(item.endDate||item.date);
      if(endP<=startP)endP=startP+0.8;
      var barW=(endP-startP);
      var barColor=item.complete?"#4ade80":item.type==="meeting"?"#3b82f6":item.type==="golive"?"#a78bfa":item.phaseColor||"#4f46e5";
      var fmtD=item.date?fmtDate(item.date):"";
      h+='<tr class="gantt-row">';
      h+='<td class="gantt-label-col"><span class="gantt-name'+(item.type==="meeting"?" meeting":"")+'">'+item.label+'</span><span style="font-size:9px;color:#374151;margin-left:5px">'+fmtD+'</span></td>';
      h+='<td class="gantt-bar-cell">';
      h+='<div style="position:absolute;inset:0">';
      // Today line
      h+='<div class="gantt-today" style="left:'+todayPct+'%"></div>';
      // Bar
      h+='<div class="gantt-bar" style="left:'+startP+'%;width:'+barW+'%;background:'+barColor+'" title="'+item.label+' · '+fmtD+'">'+item.label+'</div>';
      h+='</div></td></tr>';
    });
  });

  h+='</tbody></table></div>';
  return h;
}


// ── CUSTOM CALENDAR PICKER ────────────────────────────────────
var _calOpen=null;
function openCal(id){
  // Close any open calendar
  if(_calOpen&&_calOpen!==id){
    var prev=document.getElementById('cal-drop-'+_calOpen);
    if(prev)prev.classList.remove('open');
  }
  _calOpen=id;
  var drop=document.getElementById('cal-drop-'+id);
  if(!drop)return;
  if(drop.classList.contains('open')){drop.classList.remove('open');_calOpen=null;return;}
  // Position below the button
  var btn=document.getElementById('cal-trigger-'+id);
  if(btn){
    var r=btn.getBoundingClientRect();
    drop.style.top=(r.bottom+4)+'px';
    drop.style.left=Math.min(r.left,window.innerWidth-230)+'px';
  }
  drop.classList.add('open');
}
function closeCal(id){
  var drop=document.getElementById('cal-drop-'+id);
  if(drop)drop.classList.remove('open');
  if(_calOpen===id)_calOpen=null;
}
document.addEventListener('click',function(e){
  if(_calOpen&&!e.target.closest('.cal-wrap')&&!e.target.closest('.cal-drop')){
    closeCal(_calOpen);
  }
});
// Calendar state - store current picker state
var _calState={};
function buildCal(id,year,month){
  var drop=document.getElementById('cal-drop-'+id);
  if(!drop)return;
  var state=_calState[id]||{};
  var selDate=state.sel||'';
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  var today=new Date();today.setHours(0,0,0,0);
  var first=new Date(year,month,1);
  var startDay=first.getDay();
  var daysInMonth=new Date(year,month+1,0).getDate();
  var prevDays=new Date(year,month,0).getDate();
  var prevY=month===0?year-1:year, prevM=month===0?11:month-1;
  var nextY=month===11?year+1:year, nextM=month===11?0:month+1;
  var h='<div class="cal-nav">';
  h+='<button data-id="'+id+'" data-y="'+prevY+'" data-m="'+prevM+'" onclick="buildCal(this.dataset.id,+this.dataset.y,+this.dataset.m)">◀</button>';
  h+='<span>'+months[month]+' '+year+'</span>';
  h+='<button data-id="'+id+'" data-y="'+nextY+'" data-m="'+nextM+'" onclick="buildCal(this.dataset.id,+this.dataset.y,+this.dataset.m)">▶</button>';
  h+='</div><div class="cal-grid">';
  days.forEach(function(d){h+='<div class="cal-dh">'+d+'</div>';});
  for(var i=startDay-1;i>=0;i--){h+='<div class="cal-d other">'+(prevDays-i)+'</div>';}
  for(var d=1;d<=daysInMonth;d++){
    var dt=new Date(year,month,d);dt.setHours(0,0,0,0);
    var iso=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var cls='cal-d'+(dt.getTime()===today.getTime()?' today':'')+(iso===selDate?' sel':'');
    h+='<div class="'+cls+'" data-id="'+id+'" data-iso="'+iso+'" onclick="pickCalDate(this.dataset.id,this.dataset.iso)">'+d+'</div>';
  }
  var total=startDay+daysInMonth,rem=total%7===0?0:7-total%7;
  for(var n=1;n<=rem;n++){h+='<div class="cal-d other">'+n+'</div>';}
  h+='</div><button class="cal-clear" data-id="'+id+'" onclick="pickCalDate(this.dataset.id,\'\')">✕ Clear date</button>';
  drop.innerHTML=h;
}
function pickCalDate(id,iso){
  closeCal(id);
  var state=_calState[id];
  if(state&&state.cb)state.cb(iso);
}
function openCalFor(id,selDate,cb){
  _calState[id]={sel:selDate,cb:cb};
  var d=selDate?new Date(selDate+'T00:00:00'):new Date();
  buildCal(id,d.getFullYear(),d.getMonth());
  openCal(id);
}

// ── INSIGHTS CHAT ────────────────────────────────────────────
const insHistory={};
async function insAsk(gi,q){
  const sq=document.getElementById("ins-sq-"+gi);if(sq)sq.style.display="none";
  await insRunAsk(gi,q);
}
async function insSend(gi){
  const inp=document.getElementById("ins-inp-"+gi);if(!inp)return;
  const q=inp.value.trim();if(!q)return;
  inp.value="";
  const sq=document.getElementById("ins-sq-"+gi);if(sq)sq.style.display="none";
  await insRunAsk(gi,q);
}
function insClear(gi){
  insHistory[gi]=[];
  const log=document.getElementById("ins-log-"+gi);if(log)log.innerHTML="";
  const sq=document.getElementById("ins-sq-"+gi);if(sq)sq.style.display="flex";
  const clr=document.getElementById("ins-clr-"+gi);if(clr)clr.style.display="none";
}
function insAppend(gi,cls,txt){
  const log=document.getElementById("ins-log-"+gi);if(!log)return null;
  const d=document.createElement("div");d.className="chat-bubble "+cls;d.textContent=txt;
  log.appendChild(d);log.scrollTop=log.scrollHeight;return d;
}
async function insRunAsk(gi,q){
  if(!insHistory[gi])insHistory[gi]=[];
  const fcs=fc();const cl=fcs[Math.min(si,Math.max(0,fcs.length-1))];
  insAppend(gi,"cb-user",q);
  const clr=document.getElementById("ins-clr-"+gi);if(clr)clr.style.display="block";
  const btn=document.getElementById("ins-btn-"+gi);if(btn)btn.disabled=true;
  const thinking=insAppend(gi,"cb-thinking","Analyzing transcripts…");
  const txMeetings=cl.meetings.map((m,i)=>({...m,meta:getMeta(cl.name,i)})).filter(m=>m.meta.transcript.trim());
  const context=txMeetings.map(m=>"=== MEETING: "+m.title+" | "+m.date+" | "+(m.meta.mtype||m.src)+" ===\n"+m.meta.transcript.trim()).join("\n\n");
  const sys="You are an onboarding analyst for OCC (One Click Contractor). You have meeting transcripts for \""+cl.name+"\". Answer questions about what was discussed. Be specific, cite which meeting, quote or paraphrase directly. If info isn't in the transcripts, say so clearly. Use bullets for multiple items.\n\nMEETING TRANSCRIPTS:\n"+context;
  insHistory[gi].push({role:"user",content:q});
  try{
    if(!ANTHROPIC_KEY||ANTHROPIC_KEY==="YOUR_API_KEY_HERE"){
      throw new Error("No API key set. Add your Anthropic key to the ANTHROPIC_KEY constant at the top of the script.");
    }
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":ANTHROPIC_KEY,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:insHistory[gi]})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const reply=(data.content||[]).find(function(b){return b.type==="text";})||{text:"No response."};
    insHistory[gi].push({role:"assistant",content:reply.text});
    if(thinking&&thinking.parentNode)thinking.parentNode.removeChild(thinking);
    insAppend(gi,"cb-ai",reply.text);
  }catch(e){
    if(thinking&&thinking.parentNode)thinking.parentNode.removeChild(thinking);
    insHistory[gi].pop();
    insAppend(gi,"cb-err","Error: "+e.message);
  }finally{if(btn)btn.disabled=false;}
}
